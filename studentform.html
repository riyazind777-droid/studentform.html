<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student form</title>
    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }

        button {
            width: 100%;
            cursor: pointer;
            padding: 5px;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
        }

        body {
            text-align: center;
        }

        .delbtn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>STUDENT FORM</h1>

    <table>
        <tr>
            <td><b>Name</b></td>
            <td><input type="text" id="naame"></td>
        </tr>

        <tr>
            <td><b>Age</b></td>
            <td><input type="number" id="age"></td>
        </tr>

        <tr>
            <td><b>Gender</b></td>
            <td>
                <input type="radio" name="gender" value="Male" checked>Male
                <input type="radio" name="gender" value="Female">Female
            </td>
        </tr>

        <tr>
            <td><b>Course</b></td>
            <td>
                <select id="course">
                    <option>JavaScript</option>
                    <option>Python</option>
                    <option>Java</option>
                    <option>React</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Email</b></td>
            <td><input type="email" id="email"></td>
        </tr>

        <tr>
            <td colspan="2">
                <button id="save">Save</button>
            </td>
        </tr>
    </table>

    <br>

    <table id="studentTable">
        <tr>
            <th>NAME</th>
            <th>AGE</th>
            <th>COURSE</th>
            <th>GENDER</th>
            <th>EMAIL</th>
            <th>ACTION</th>
        </tr>
    </table>

    <script>
        var save = document.getElementById("save");

        save.addEventListener("click", function () {

            var naame = document.getElementById("naame").value;
            var age = document.getElementById("age").value;
            var course = document.getElementById("course").value;
            var email = document.getElementById("email").value;

            var gender = document.querySelector('input[name="gender"]:checked').value;

            var table = document.getElementById("studentTable");

            var row = document.createElement("tr");

            var col1 = document.createElement("td");
            var col2 = document.createElement("td");
            var col3 = document.createElement("td");
            var col4 = document.createElement("td");
            var col5 = document.createElement("td");
            var col6 = document.createElement("td");

            col1.innerText = naame;
            col2.innerText = age;
            col3.innerText = course;
            col4.innerText = gender;
            col5.innerText = email;

            col6.innerHTML = "<button class='delbtn' onclick='deleteRow(event)'>Delete</button>";

            row.appendChild(col1);
            row.appendChild(col2);
            row.appendChild(col3);
            row.appendChild(col4);
            row.appendChild(col5);
            row.appendChild(col6);

            table.appendChild(row);
        });

        function deleteRow(event) {
            event.target.parentElement.parentElement.remove();
        }





    </script>
</body>

</html>
